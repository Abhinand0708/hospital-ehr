{% extends "base.html" %}
{% block title %}Edit Patient{% endblock %}
{% block content %}
<div class="dashboard-container">
    <nav class="navbar">
        <div class="navbar-brand"><h2>🏥 Hospital Management System</h2></div>
        <div class="navbar-user">
            <a href="{{ url_for('patient_detail', patient_id=patient.patient_id) }}" class="btn-back">← Back to Patient</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
        </div>
    </nav>
    <div class="page-content">
        <h1>✏️ Edit Patient — {{ patient.patient_id }}</h1>
        <p>Update patient details below</p>
        <div class="form-container">
            <form method="POST" class="hospital-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" name="patient_firstname" value="{{ patient.patient_firstname }}" required>
                    </div>
                    <div class="form-group">
                        <label>Middle Name</label>
                        <input type="text" name="patient_middlename" value="{{ patient.patient_middlename or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" name="patient_lastname" value="{{ patient.patient_lastname }}" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" name="patient_DOB" value="{{ patient.patient_DOB }}" required>
                    </div>
                    <div class="form-group">
                        <label>Gender *</label>
                        <select name="gender" required>
                            <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ patient.email or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" value="{{ patient.phone or '' }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Aadhar Number</label>
                        <input type="text" name="aadhar_number" value="{{ patient.aadhar_number or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Marital Status</label>
                        <select name="marital_status">
                            <option value="">Select</option>
                            {% for s in ['Single','Married','Divorced','Widowed'] %}
                            <option value="{{ s }}" {% if patient.marital_status == s %}selected{% endif %}>{{ s }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Occupation</label>
                        <input type="text" name="occupation" value="{{ patient.occupation or '' }}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" rows="2">{{ patient.address or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label>Medical History</label>
                    <textarea name="medical_history" rows="2">{{ patient.medical_history or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label>Allergies</label>
                    <textarea name="allergies" rows="2">{{ patient.allergies or '' }}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Emergency Contact Name</label>
                        <input type="text" name="emergency_contact" value="{{ patient.emergency_contact or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Emergency Contact Phone</label>
                        <input type="text" name="emergency_phone" value="{{ patient.emergency_phone or '' }}">
                    </div>
                </div>
                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn-submit" style="margin-top:0;">✓ Save Changes</button>
                    <a href="{{ url_for('patient_detail', patient_id=patient.patient_id) }}"
                       style="padding:0.75rem 1.5rem; background:#6b7280; color:white; border-radius:8px; text-decoration:none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
