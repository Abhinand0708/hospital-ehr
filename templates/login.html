{% extends "base.html" %}
{% block title %}Login - Hospital Management System{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h1>🏥 Hospital Management System</h1>
            <p>Please login to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #e5e7eb;">
            <p style="color:#6b7280;font-size:0.85rem;margin-bottom:10px;">
                Have an invite code from admin?
            </p>
            <a href="{{ url_for('register') }}"
               style="display:inline-block;background:#10b981;color:white;padding:10px 28px;
                      border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem;">
                Register with Invite Code
            </a>
        </div>
    </div>
</div>
{% endblock %}
